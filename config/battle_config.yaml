# FGO 刷本配置示例
# 修改这个文件来调整每次刷本的策略，无需改代码

loop_count: 10 # 刷本次数（-1 为无限循环）
match_threshold: 0.70 # 图像识别置信度阈值（0~1，越高越严格）
log_level: DEBUG # 日志级别，可选 DEBUG/INFO/WARNING
skill_interval: 1.5 # 每个技能释放后的额外等待时间（秒）
skill_pre_skip_delay: 0.5 # 点击技能后到点击加速跳过前的等待时间（秒）
master_skill_open_delay: 0.6 # 点击御主技能栏后，到点具体技能前的等待时间（秒）
quest_slot: 1 # 主菜单中要点击的关卡位，1/2/3 分别对应从上到下三个入口

support:
  class: berserker # v2 支持 all / berserker
  servant: "berserker/morgan" # 目标助战从者完整标识，例如 berserker/morgan；留空则沿用默认位选择
  pick_index: 1 # 当前页助战位序号，1/2/3
  max_scroll_pages: 10 # 最多向下搜索的页数，超出后回退到默认位
  recognition:
    min_slot_score: 0.0 # 0 表示使用向量库默认阈值
    min_slot_margin: 0.0 # 0 表示使用向量库默认分差
    confirm_delay: 0.25 # 二次确认前等待时间（秒）
    save_debug_mismatches: true # 低分或歧义时保留少量调试图
    max_debug_images: 12 # 调试图最多保留数量

ocr:
  min_confidence: 0.8 # 低于该置信度时视为识别失败
  np_ready_value: 100 # NP 达到该值时视为可释放宝具
  retry_once_on_low_confidence: true # 低置信度时额外刷新一次重读
  save_ocr_crops: true # 当前示例开启；如需减少留图可改为 false，且最多保留 9 张

smart_battle:
  enabled: true # 当前示例开启；关闭后回退到 skill_sequence
  frontline:
    - slot: 1
      servant: caster/zhuge_liang
      role: support
      is_support: false
    - slot: 2
      servant: caster/merlin
      role: support
      is_support: false
    - slot: 3
      servant: berserker/morgan
      role: attacker
      is_support: true
  wave_plan:
    1:
      - actor: 1
        skill: 1
        condition_tags:
          - np_not_ready
        phase: charge
      - actor: 1
        skill: 2
        phase: buff
      - actor: 2
        skill: 1
        phase: buff
      - actor: 2
        skill: 3
        phase: buff
    2:
      - actor: 1
        skill: 3
        phase: buff
      - actor: 3
        skill: 2
        condition_tags:
          - np_not_ready
        phase: charge
      - actor: 3
        skill: 1
        phase: buff
    3:
      - actor: 3
        skill: 1
        phase: buff
      - actor: 3
        skill: 3
        phase: buff
  fail_mode: conservative
  sample_mode: false

# 本场战斗要依次释放的技能动作。
# 纯数字 1-9 仍表示从者技能。
# 如需释放御主技能，请使用 type/master/skill 结构。
skill_sequence:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  - 9
  - type: master
    skill: 1
  - type: master
    skill: 2
