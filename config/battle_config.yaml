# FGO 刷本配置示例
# 修改这个文件来调整每次刷本的策略，无需改代码

total_waves: 3 # 总波数
loop_count: 10 # 刷本次数（-1 为无限循环）
match_threshold: 0.60 # 图像识别置信度阈值（0~1，越高越严格）

# 每波释放的技能编号（1-9 对应从者1技1/技2/技3 → 从者2技1... 以此类推）
skill_sequence:
  - wave: 1
    skills: [1, 2, 3] # 第一波：从者1全开
  - wave: 2
    skills: [4, 5] # 第二波：从者2技1、技2
  - wave: 3
    skills: [7, 8, 9] # 第三波：从者3全开
